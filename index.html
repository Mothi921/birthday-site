<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
  scroll-behavior: smooth;
}

.section {
  padding: 100px 20px;
}

.photo {
  width: 280px;
  border-radius: 20px;
  margin-top: 20px;
}

video, canvas {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 200px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>For You ❤️</h1>

<div class="section">
  <p>You make everything better ✨</p>
  <img src="photo1.jpg" class="photo">
</div>

<div class="section">
  <p>Every moment with you feels special ❤️</p>
  <img src="photo2.jpg" class="photo">
</div>

<div class="section">
  <p>You are my favorite person 💫</p>
  <img src="photo3.jpg" class="photo">
</div>

<div class="section">
  <p>And I wouldn’t trade this for anything 💖</p>
  <img src="photo4.jpg" class="photo">
</div>

<div class="section">
  <h2>My love ❤️</h2>
  <p>This was just a small surprise for you.</p>
</div>

<video id="webcam" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("webcam");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 640;
canvas.height = 480;

let lastY = null;

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

    const hand = results.multiHandLandmarks[0];

    const indexFinger = hand[8];
    const middleFinger = hand[12];

    // DRAW RED DOTS (debug)
    [indexFinger, middleFinger].forEach(point => {
      ctx.beginPath();
      ctx.arc(point.x * canvas.width, point.y * canvas.height, 8, 0, 2*Math.PI);
      ctx.fillStyle = "red";
      ctx.fill();
    });

    // average Y position
    const avgY = (indexFinger.y + middleFinger.y) / 2;

    if (lastY !== null) {
      const diff = avgY - lastY;

      if (Math.abs(diff) > 0.01) {
        window.scrollBy(0, diff * 1200);
      }
    }

    lastY = avgY;
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();
</script>

</body>
</html>
