<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// ===== RIDDLE LOGIC =====
function checkR1(){
  let a = document.getElementById("r1").value.toLowerCase().trim();
  if(a === "hod" || a === "high on desserts"){
    document.getElementById("s1").classList.add("show");
    document.getElementById("r2box").style.display = "block";
    document.getElementById("r2").focus();
  }
}

function checkR2(){
  let a = document.getElementById("r2").value.toLowerCase().trim();
  if(a === "room 6" || a === "room six"){
    document.getElementById("s2").classList.add("show");
    document.getElementById("r3box").style.display = "block";
    document.getElementById("r3").focus();
  }
}

function checkR3(){
  let a = document.getElementById("r3").value.toLowerCase().trim();
  if(a === "mkt"){
    document.getElementById("s3").classList.add("show");
    document.getElementById("r4box").style.display = "block";
    document.getElementById("r4").focus();
  }
}

function checkR4(){
  let a = document.getElementById("r4").value.toLowerCase().trim();
  if(a === "remo"){
    document.getElementById("s4").classList.add("show");
    setTimeout(showProposal, 800);
  }
}

// ===== ENTER KEY FIX =====
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {

    const active = document.activeElement;

    if (active.id === "r1") checkR1();
    else if (active.id === "r2") checkR2();
    else if (active.id === "r3") checkR3();
    else if (active.id === "r4") checkR4();
  }
});

// ===== POPUP =====
function showProposal(){
  let p = document.createElement("div");
  p.className = "popup";
  p.innerHTML = `
    <p style="font-size:30px; text-align:center;">
      So Nee Yenna Kalyanam Panikiviya?<br>
      Aama Na Vandhu Bike Le Okaru Chellam.
    </p>
    <button onclick="yes()">Yes</button>
    <button onclick="no()">No</button>
  `;
  document.body.appendChild(p);
}

function no(){
  alert("Wrong answer 😏");
  document.querySelector(".popup").remove();
  showProposal();
}

function yes(){
  document.querySelector(".popup").remove();
  document.getElementById("treasure").style.display = "flex";
}

// ===== TREASURE =====
function openChest(){
  const letter = document.getElementById("letter");
  letter.style.display = "block";
  setTimeout(() => {
    letter.classList.add("open");
  }, 100);
}

// ===== HAND TRACKING (YOUR WORKING VERSION, REFINED) =====
const video = document.getElementById("webcam");

// create canvas
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");
document.body.appendChild(canvas);

// styling
canvas.style.position = "fixed";
canvas.style.bottom = "10px";
canvas.style.right = "10px";
canvas.style.width = "200px";
canvas.style.height = "150px";
canvas.style.zIndex = "3001";
canvas.style.pointerEvents = "none";

video.style.position = "fixed";
video.style.bottom = "10px";
video.style.right = "10px";
video.style.width = "200px";
video.style.height = "150px";
video.style.zIndex = "3000";
video.style.borderRadius = "10px";

let lastY = null;
let trackingActive = false;
let lostFrames = 0;

// detect mobile
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

if (!isMobile) {

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
  });

  hands.onResults(results => {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

      trackingActive = true;
      lostFrames = 0;

      const hand = results.multiHandLandmarks[0];
      const indexFinger = hand[8];
      const middleFinger = hand[12];

      // red dots
      [indexFinger, middleFinger].forEach(point => {
        ctx.beginPath();
        ctx.arc(point.x * canvas.width, point.y * canvas.height, 10, 0, 2*Math.PI);
        ctx.fillStyle = "red";
        ctx.fill();
      });

      const avgY = (indexFinger.y + middleFinger.y) / 2;

      if (lastY !== null) {
        const diff = avgY - lastY;

        if (Math.abs(diff) > 0.003) {
          window.scrollBy(0, diff * 5000);
        }
      }

      lastY = avgY;

    } else {
      lostFrames++;
      if (lostFrames > 5) {
        lastY = null;
      }
    }
  });

  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });

  camera.start();
}
</script>

</body>
</html>
