<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.section {
  padding: 100px 20px;
}

.photo {
  width: 280px;
  border-radius: 20px;
  margin-top: 20px;
}

video, canvas {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 200px;
  border-radius: 10px;
}

#fallback {
  position: fixed;
  top: 10px;
  width: 100%;
  text-align: center;
  color: pink;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="fallback">If gestures don’t work, just scroll normally ❤️</div>

<h1>For You ❤️</h1>

<div class="section">
  <p>You make everything better ✨</p>
  <img src="photo1.jpg" class="photo">
</div>

<div class="section">
  <p>Every moment with you feels special ❤️</p>
  <img src="photo2.jpg" class="photo">
</div>

<div class="section">
  <p>You are my favorite person 💫</p>
  <img src="photo3.jpg" class="photo">
</div>

<div class="section">
  <p>And I wouldn’t trade this for anything 💖</p>
  <img src="photo4.jpg" class="photo">
</div>

<div class="section">
  <h2>My love ❤️</h2>
  <p>This was just a small surprise for you.</p>
</div>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("webcam");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let lastY = null;
let trackingActive = false;

// Detect if mobile
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// If mobile → skip hand tracking entirely
if (!isMobile) {

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
  });

  hands.onResults(results => {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

      trackingActive = true;

      const hand = results.multiHandLandmarks[0];

      const indexFinger = hand[8];
      const middleFinger = hand[12];

      // Draw big visible dots
      [indexFinger, middleFinger].forEach(point => {
        ctx.beginPath();
        ctx.arc(point.x * canvas.width, point.y * canvas.height, 10, 0, 2*Math.PI);
        ctx.fillStyle = "red";
        ctx.fill();
      });

      const avgY = (indexFinger.y + middleFinger.y) / 2;

      if (lastY !== null) {
        const diff = avgY - lastY;

        if (Math.abs(diff) > 0.005) {
          window.scrollBy(0, diff * 1200);
        }
      }

      lastY = avgY;
    }
  });

  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });

  camera.start();
}

// Hide fallback if tracking works
setTimeout(() => {
  if (trackingActive) {
    document.getElementById("fallback").style.display = "none";
  }
}, 4000);
</script>

</body>
</html>
